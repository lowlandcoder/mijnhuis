# Nginx-instelling voor zigbee2mqtt.lab023.nl.
# Plaats dit als /etc/nginx/sites-available/zigbee2mqtt en activeer met een
# symlink naar sites-enabled. Stel daarna HTTPS in met Certbot.
#
# Deze pagina is de beheerpagina van Zigbee2MQTT zelf (uit de docker-stack
# in deze map, poort 8080) en kan Zigbee-apparaten bedienen. Daarom staat
# hij, net als MijnServer, achter een wachtwoord (HTTP basic auth). Deze
# instelling gebruikt bewust hetzelfde wachtwoordbestand als MijnServer
# (/etc/nginx/.htpasswd-mijnserver), zodat dezelfde gebruikersnaam en
# hetzelfde wachtwoord voor beide pagina's gelden. Staat dat bestand er nog
# niet, maak het dan eenmalig aan (bijvoorbeeld voor gebruiker "peter"):
#
#     sudo apt install apache2-utils        # levert htpasswd
#     sudo htpasswd -c /etc/nginx/.htpasswd-mijnserver peter
#
# Voeg extra gebruikers toe zonder -c (anders wordt het bestand overschreven).
# Een wachtwoordwijziging hoeft dan maar op één plek (dit bestand).

server {
    listen 80;
    server_name zigbee2mqtt.lab023.nl;

    # Toegang alleen na inloggen; zelfde bestand als MijnServer.
    auth_basic           "Zigbee2MQTT — afgeschermd";
    auth_basic_user_file /etc/nginx/.htpasswd-mijnserver;

    # Doorsturen naar de zigbee2mqtt-container (poort 8080 op de server,
    # zie docker-compose.yml). Upgrade-headers zijn nodig omdat de
    # beheerpagina een websocket gebruikt voor live-updates.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
    }
}
