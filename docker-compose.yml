services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - huis

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    container_name: zigbee2mqtt
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      # Pas dit pad aan op het pad uit `ls -l /dev/serial/by-id/`
      - /dev/serial/by-id/usb-ITead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_5e004c02a689ef1180c0a995ef8776e9-if00-port0:/dev/ttyACM0
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - huis

  stekker:
    build:
      context: .
      dockerfile: stekker/Dockerfile
    container_name: stekker
    restart: unless-stopped
    depends_on:
      - mosquitto
      - zigbee2mqtt
    volumes:
      - ./config.json:/app/config.json:ro
      - ./schema.json:/app/schema.json:ro
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - huis

  rooster:
    build:
      context: .
      dockerfile: rooster/Dockerfile
    container_name: rooster
    restart: unless-stopped
    volumes:
      # Lezen en schrijven: de bewerkpagina slaat de tijden hierin op.
      - ./schema.json:/app/schema.json
    ports:
      # Alleen op de server zelf; nginx zet dit door op de root van mijnhuis.lab023.nl.
      - "127.0.0.1:8090:8090"
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - huis

networks:
  huis:
    driver: bridge
