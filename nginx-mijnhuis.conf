# Nginx-instelling voor mijnhuis.lab023.nl.
# Plaats dit als /etc/nginx/sites-available/mijnhuis en activeer met een
# symlink naar sites-enabled. Stel daarna HTTPS in met Certbot.
#
# Deze pagina toont het rooster: de bewerkpagina voor de schakeltijden
# (rooster-container uit de docker-stack in deze map, poort 8090). Omdat via
# deze pagina de schakeltijden van Zigbee-stekkers worden gewijzigd, staat
# hij, net als MijnServer, achter een wachtwoord (HTTP basic auth). Deze
# instelling gebruikt bewust hetzelfde wachtwoordbestand als MijnServer
# (/etc/nginx/.htpasswd-mijnserver), zodat dezelfde gebruikersnaam en
# hetzelfde wachtwoord voor beide pagina's gelden. Staat dat bestand er nog
# niet, maak het dan eenmalig aan (bijvoorbeeld voor gebruiker "peter"):
#
#     sudo apt install apache2-utils        # levert htpasswd
#     sudo htpasswd -c /etc/nginx/.htpasswd-mijnserver peter
#
# Voeg extra gebruikers toe zonder -c (anders wordt het bestand overschreven).
#
# De Zigbee2MQTT-beheerpagina zelf (poort 8080) staat los hiervan en is
# bereikbaar via mijnzigbee.lab023.nl.

server {
    listen 80;
    server_name mijnhuis.lab023.nl;

    # Toegang alleen na inloggen; zelfde bestand als MijnServer.
    auth_basic           "Mijn Huis — afgeschermd";
    auth_basic_user_file /etc/nginx/.htpasswd-mijnserver;

    # Doorsturen naar de rooster-container (poort 8090 op de server, alleen
    # lokaal gebonden, zie docker-compose.yml). De rooster-pagina staat zo
    # meteen op de root van mijnhuis.lab023.nl.
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
